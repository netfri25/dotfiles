backtraces-path = "/tmp/neovide_backtraces.log" # see below for the default platform specific location
# chdir = "/path/to/dir"
fork = true
frame = "full"
# grid = "420x240" # mutually exclusive with `size` and `maximized`
# size = "1200x800" # mutually exclusive with `grid` and `maximized`
idle = true
maximized = false
mouse-cursor-icon = "arrow"
neovim-bin = "/usr/bin/nvim" # in reality found dynamically on $PATH if unset
no-multigrid = false
# server = "/tmp/nvim.sock" # or "127.0.0.1:7777"
srgb = false # platform-specific: false (Linux/macOS) or true (Windows)
tabs = false
title-hidden = false
vsync = true
wayland-app-id = "neovide"
wsl = false

[font]
normal = ["Iosevka Simple", "Symbols Nerd Font Mono", "nasin-nanpa"]
hinting = "full"
edging = "antialias"
# Will use the bundled Fira Code Nerd Font by default
size = 14.0

[box-drawing]
# "font-glyph", "native" or "selected-native"
mode = "native"
